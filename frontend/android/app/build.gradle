apply plugin: 'com.android.application'

// Cargar propiedades desde local.properties
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

def getVersionCode() {
    return new Date().format('yyyyMMdd').toInteger()
}

android {
    namespace = "com.oxyra.app"
    compileSdk = rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.oxyra.app"
        minSdkVersion 26
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode getVersionCode()
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        debug {
            storeFile file('C:/Users/jordi/.android/debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def keystoreFile = localProperties.getProperty('RELEASE_STORE_FILE')
            if (keystoreFile) {
                storeFile file(keystoreFile)
                storePassword localProperties.getProperty('RELEASE_STORE_PASSWORD')
                keyAlias localProperties.getProperty('RELEASE_KEY_ALIAS')
                keyPassword localProperties.getProperty('RELEASE_KEY_PASSWORD')
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            debuggable true
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
            debuggable false
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "Oxyra-${variant.name}-${defaultConfig.versionName}.apk"
        }
    }
    
    bundle {
        language { enableSplit = true }
        density { enableSplit = true }
        abi { enableSplit = true }
    }
}

// Solución para que Android detecte cambios de Capacitor sin necesidad de hacer "Clean Project"
tasks.matching { it.name.startsWith("merge") && it.name.endsWith("Assets") }.configureEach {
    outputs.upToDateWhen { false }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':codetrix-studio-capacitor-google-auth')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied.")
}
